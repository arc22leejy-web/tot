<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안전 체크리스트 - 추락 사고 예방</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6; /* Tailwind bg-gray-100 */
        }
        /* Custom checkbox style */
        .custom-checkbox input:checked + div {
            background-color: #3b82f6; /* Tailwind bg-blue-500 */
            border-color: #3b82f6;
        }
        .custom-checkbox input:checked + div svg {
            display: block;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">

    <main class="bg-white rounded-xl shadow-lg w-full max-w-3xl overflow-hidden">
        <!-- Header Section -->
        <header class="bg-blue-600 text-white p-6 md:p-8 flex flex-col md:flex-row md:items-center justify-between">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold mb-2 tracking-tight">현장 안전 점검 체크리스트</h1>
                <p class="text-blue-100 text-sm md:text-base font-medium">카테고리: 추락 사고 예방</p>
            </div>
            <!-- Progress Circle (CSS based) -->
            <div class="mt-4 md:mt-0 flex items-center gap-4">
                 <div class="text-right">
                    <p class="text-xs text-blue-200 uppercase tracking-wider font-semibold">진척도</p>
                    <p class="text-xl font-bold" id="progress-text">0 / 4</p>
                 </div>
                 <div class="relative w-16 h-16">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <!-- Background Circle -->
                        <path class="text-blue-400/30 stroke-current" stroke-width="3" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <!-- Progress Circle -->
                        <path id="progress-circle" class="text-white stroke-current transition-all duration-500 ease-in-out" stroke-width="3" stroke-dasharray="0, 100" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                 </div>
            </div>
        </header>

        <!-- Checklist Area -->
        <div class="p-6 md:p-8">
            
            <div class="mb-6 pb-4 border-b border-gray-200 flex justify-between items-center">
                 <p class="text-gray-600 font-medium">점검 항목을 모두 확인하고 체크해주세요.</p>
                 <button id="reset-btn" class="text-sm text-gray-500 hover:text-red-500 transition-colors flex items-center gap-1 font-medium">
                     <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                     초기화
                 </button>
            </div>

            <!-- List of Items -->
            <ul class="space-y-4" id="checklist-container">
                <!-- Checklist items will be generated by JS -->
            </ul>

            <!-- Action Buttons -->
            <div class="mt-8 pt-6 border-t border-gray-200 flex flex-col sm:flex-row gap-4 justify-end">
                <!-- Date / Info display -->
                <div class="sm:mr-auto flex items-center text-sm text-gray-500 font-medium bg-gray-50 px-4 py-2 rounded-lg border border-gray-100">
                    <svg class="w-4 h-4 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    점검일: <span id="current-date" class="ml-1 text-gray-700"></span>
                </div>
                
                <button id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex justify-center items-center gap-2">
                    <span>점검 완료 보고</span>
                    <svg class="w-5 h-5 hidden" id="submit-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Custom Alert Modal (instead of alert()) -->
    <div id="alert-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 transition-opacity opacity-0">
        <div class="bg-white rounded-xl shadow-2xl p-6 md:p-8 max-w-sm w-full mx-4 transform scale-95 transition-transform" id="alert-modal-content">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4" id="modal-icon-bg">
                    <svg class="h-6 w-6 text-green-600" id="modal-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-lg leading-6 font-bold text-gray-900" id="modal-title">보고 완료</h3>
                <div class="mt-2">
                    <p class="text-sm text-gray-500" id="modal-message">모든 안전 항목이 점검되었습니다. 안전한 작업 되십시오.</p>
                </div>
            </div>
            <div class="mt-5 sm:mt-6">
                <button type="button" id="modal-close-btn" class="inline-flex justify-center w-full rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:text-sm">
                    확인
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data derived from the user's prompt
        const checklistData = [
            "바닥면에서 높이 1M 이상인 계단의 개방된 측면에 안전난간이 설치되어 있는가?",
            "근로자는 개인보호구(안전대, 안전모, 안전화)를 올바르게 착용하고 있는가?",
            "추락방호장치가 곤란한 장소에서 3개 이상의 버팀대를 갖춘 적절한 이동식 사다리를 안전수칙에 따라 적정히 사용하는가?",
            "작업발판, 안전난간이나 개구부 덮개를 설치한 경우 충분한 강도를 가진 재료로 견고하게 설치되어 있는가?"
        ];

        const container = document.getElementById('checklist-container');
        const progressText = document.getElementById('progress-text');
        const progressCircle = document.getElementById('progress-circle');
        const submitBtn = document.getElementById('submit-btn');
        const submitIcon = document.getElementById('submit-icon');
        const resetBtn = document.getElementById('reset-btn');
        const dateSpan = document.getElementById('current-date');
        
        // Modal elements
        const modal = document.getElementById('alert-modal');
        const modalContent = document.getElementById('alert-modal-content');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalIconBg = document.getElementById('modal-icon-bg');
        const modalIcon = document.getElementById('modal-icon');

        let checkedCount = 0;
        const totalItems = checklistData.length;

        // Set current date
        const today = new Date();
        dateSpan.textContent = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;

        // Render checklist items
        checklistData.forEach((itemText, index) => {
            const li = document.createElement('li');
            li.className = 'bg-gray-50 hover:bg-blue-50 border border-gray-200 rounded-lg p-4 transition-colors duration-200 cursor-pointer shadow-sm';
            
            li.innerHTML = `
                <label class="flex items-start gap-4 cursor-pointer custom-checkbox w-full h-full">
                    <div class="relative flex-shrink-0 mt-0.5">
                        <input type="checkbox" class="sr-only peer" data-index="${index}">
                        <div class="w-6 h-6 border-2 border-gray-300 rounded bg-white transition-colors flex items-center justify-center peer-focus:ring-2 peer-focus:ring-blue-500 peer-focus:ring-offset-2">
                            <svg class="w-4 h-4 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                    <div class="flex-1">
                        <p class="text-gray-800 font-medium leading-relaxed select-none group-hover:text-blue-900 transition-colors">${itemText}</p>
                    </div>
                </label>
            `;

            // Clicking the whole li triggers the checkbox
            const checkbox = li.querySelector('input');
            const label = li.querySelector('label');
            
            // Prevent double firing when clicking directly on the input vs label
            label.addEventListener('click', (e) => {
                // Let the native click event handle the state change if clicking input directly
                // If clicking label, the browser handles it, but we listen for the change event on the input
            });

            checkbox.addEventListener('change', (e) => {
                updateProgress();
                
                // Visual feedback on the list item itself
                if (e.target.checked) {
                    li.classList.add('border-blue-300', 'bg-blue-50/50');
                    li.classList.remove('border-gray-200', 'bg-gray-50');
                } else {
                    li.classList.remove('border-blue-300', 'bg-blue-50/50');
                    li.classList.add('border-gray-200', 'bg-gray-50');
                }
            });

            container.appendChild(li);
        });

        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
            
            // Update text
            progressText.textContent = `${checkedCount} / ${totalItems}`;
            
            // Update circle (dasharray: value, total (approx 100))
            const percentage = (checkedCount / totalItems) * 100;
            progressCircle.setAttribute('stroke-dasharray', `${percentage}, 100`);

            // Change progress circle color based on completion
            if (checkedCount === totalItems) {
                progressCircle.classList.remove('text-white');
                progressCircle.classList.add('text-green-300'); // Or keep white, personal preference
                
                submitBtn.classList.add('bg-green-600', 'hover:bg-green-700', 'shadow-green-500/30');
                submitBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                submitIcon.classList.remove('hidden');
            } else {
                progressCircle.classList.add('text-white');
                progressCircle.classList.remove('text-green-300');
                
                submitBtn.classList.remove('bg-green-600', 'hover:bg-green-700', 'shadow-green-500/30');
                submitBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                submitIcon.classList.add('hidden');
            }
        }

        // Reset functionality
        resetBtn.addEventListener('click', () => {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = false;
                // Dispatch change event to trigger the visual update logic attached to the checkbox
                cb.dispatchEvent(new Event('change'));
            });
        });

        // Modal Functionality
        function showModal(type) {
            modal.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);

            if (type === 'success') {
                modalTitle.textContent = "보고 완료";
                modalTitle.className = "text-lg leading-6 font-bold text-gray-900";
                modalMessage.textContent = "모든 안전 항목이 점검되었습니다. 안전한 작업 되십시오.";
                modalIconBg.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4";
                modalIcon.className = "h-6 w-6 text-green-600";
                modalIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>`;
                modalCloseBtn.className = "inline-flex justify-center w-full rounded-md border border-transparent shadow-sm px-4 py-2 bg-green-600 text-base font-medium text-white hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 sm:text-sm";
            } else {
                modalTitle.textContent = "점검 미완료";
                modalTitle.className = "text-lg leading-6 font-bold text-red-600";
                modalMessage.textContent = "확인되지 않은 항목이 있습니다. 모든 항목을 점검 후 보고해주세요.";
                modalIconBg.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4";
                modalIcon.className = "h-6 w-6 text-red-600";
                modalIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>`;
                modalCloseBtn.className = "inline-flex justify-center w-full rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:text-sm";
            }
        }

        function hideModal() {
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // Wait for transition to finish
        }

        modalCloseBtn.addEventListener('click', hideModal);
        
        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                hideModal();
            }
        });

        // Submit action
        submitBtn.addEventListener('click', () => {
            if (checkedCount === totalItems) {
                showModal('success');
            } else {
                showModal('error');
            }
        });

        // Initial setup
        updateProgress();
    </script>
</body>
</html>
